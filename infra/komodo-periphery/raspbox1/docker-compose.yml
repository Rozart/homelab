services:
  komodo-periphery:
    image: ghcr.io/moghtech/komodo-periphery:latest
    container_name: komodo-periphery
    restart: unless-stopped
    environment:
      PERIPHERY_PASSKEYS: ${KOMODO_PASSKEY}
      PERIPHERY_PORT: 8120
      PERIPHERY_REPO_DIR: ${HOMELAB_REPOS_ROOT}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - ./appdata/periphery:/etc/komodo
      - ${HOMELAB_REPOS_ROOT}:${HOMELAB_REPOS_ROOT}
    ports:
      - "8120:8120"
