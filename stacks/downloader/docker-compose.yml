networks:
  home-network:
    external: true

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: mullvad
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES}
      SERVER_COUNTRIES: ${SERVER_COUNTRIES}
    ports:
      - 8080:8080   # qBittorrent WebUI
      - 8085:8085   # SABnzbd WebUI
      - 8084:8084   # Shelfmark WebUI
      - 5030:5030   # slskd WebUI
      - 50300:50300 # slskd Soulseek listen port
    volumes:
      - /mnt/downloads/torrents:/data/downloads/torrents
      - /mnt/downloads/usenet:/data/downloads/usenet
      - /mnt/downloads/soulseek:/data/downloads/soulseek
    restart: always
    networks:
      - home-network

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: 8080
    volumes:
      - ./appdata/qbittorrent:/config
      - /mnt/downloads/torrents:/data/downloads/torrents
    restart: always

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./appdata/sabnzbd:/config
      - /mnt/downloads/usenet:/data/downloads/usenet
    restart: always

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./appdata/prowlarr:/config
    ports:
      - 9696:9696
    restart: always
    networks:
      - home-network

  shelfmark:
    image: ghcr.io/calibrain/shelfmark:latest
    container_name: shelfmark
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      FLASK_PORT: 8084
      INGEST_DIR: /books
      DESTINATION_AUDIOBOOK: /audiobooks
      PROWLARR_URL: http://prowlarr:9696
      PROWLARR_API_KEY: ${PROWLARR_API_KEY}
      QBITTORRENT_URL: http://localhost:8080
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD}
      QBITTORRENT_CATEGORY: shelfmark-ebooks
      QBITTORRENT_CATEGORY_AUDIOBOOK: shelfmark-audiobooks
      PROWLARR_USENET_CLIENT: sabnzbd
      SABNZBD_URL: http://localhost:8085
      SABNZBD_API_KEY: ${SABNZBD_API_KEY}
      SABNZBD_CATEGORY: shelfmark-ebooks
      SABNZBD_CATEGORY_AUDIOBOOK: shelfmark-audiobooks
      ABB_ENABLED: "true"
    volumes:
      - ./appdata/shelfmark:/config
      - /mnt/downloads:/data/downloads
      - ${NAS_PATH}/calibre/ingest:/books
      - ${NAS_PATH}/media/audiobooks:/audiobooks
    restart: always

  slskd:
    image: slskd/slskd
    container_name: slskd
    network_mode: service:gluetun
    depends_on:
      - gluetun
    environment:
      SLSKD_REMOTE_CONFIGURATION: ${SLSKD_REMOTE_CONFIGURATION:-true}
      SLSKD_SLSK_USERNAME: ${SLSKD_SLSK_USERNAME}
      SLSKD_SLSK_PASSWORD: ${SLSKD_SLSK_PASSWORD}
      SLSKD_SLSK_LISTEN_PORT: 50300
      SLSKD_API_KEY: ${SLSKD_API_KEY}
    volumes:
      - ./appdata/slskd:/app
      - /mnt/downloads/soulseek:/app/shares/downloads
    restart: always

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./appdata/lidarr:/config
      - /mnt/downloads:/data/downloads
      - ${NAS_PATH}/media/music:/data/media/music
    ports:
      - 8686:8686
    restart: always
    networks:
      - home-network

  soularr:
    image: mrusse08/soularr:latest
    container_name: soularr
    user: "1000:1000"
    environment:
      TZ: ${TZ}
      SCRIPT_INTERVAL: 300
      LIDARR_API_KEY: ${LIDARR_API_KEY}
      SLSKD_API_KEY: ${SLSKD_API_KEY}
    volumes:
      - ./appdata/soularr:/data
      - /mnt/downloads/soulseek:/downloads
    restart: always
    networks:
      - home-network

  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    environment:
      TZ: ${TZ}
    ports:
      - 8191:8191
    restart: always
    networks:
      - home-network
