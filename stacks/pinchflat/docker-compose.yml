networks:
  home-network:
    external: true

services:
  pinchflat:
    image: ghcr.io/kieraneglin/pinchflat:latest
    container_name: pinchflat
    environment:
      TZ: ${TZ}
    volumes:
      - ./appdata/pinchflat:/config
      - ${NAS_PATH}/media/youtube:/downloads/youtube
      - ${NAS_PATH}/media/podcasts:/downloads/podcasts
    ports:
      - 8945:8945
    restart: always
    networks:
      - home-network
