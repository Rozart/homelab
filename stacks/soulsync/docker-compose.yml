services:
  soulsync-vpn:
    image: qmcgaw/gluetun:latest
    container_name: soulsync-vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: mullvad
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES}
      SERVER_COUNTRIES: ${SERVER_COUNTRIES}
    ports:
      - 5030:5030    # slskd WebUI
      - 50300:50300  # slskd peer connections
    volumes:
      - /mnt/downloads/soulseek:/app/shares/downloads
    restart: always
    networks:
      - home-network

  slskd:
    image: slskd/slskd
    container_name: slskd
    network_mode: service:soulsync-vpn
    depends_on:
      - soulsync-vpn
    volumes:
      - ./appdata/slskd:/app
      - /mnt/downloads/soulseek:/app/shares/downloads
    environment:
      SLSKD_REMOTE_CONFIGURATION: true
    restart: always

  soulsync:
    image: boulderbadgedad/soulsync:latest
    container_name: soulsync
    ports:
      - 8008:8008
      - 8888:8888
      - 8889:8889
    volumes:
      - ./appdata/soulsync/config:/app/config
      - ./appdata/soulsync/logs:/app/logs
      - soulsync_database:/app/data
      - /mnt/downloads/soulseek:/app/downloads
      - ${NAS_PATH}/media/music:/app/Transfer
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      FLASK_ENV: production
      PYTHONPATH: /app
      SOULSYNC_CONFIG_PATH: /app/config/config.json
      UMASK: "022"
    networks:
      - home-network
    restart: always
    depends_on:
      - slskd
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  soulsync_database:

networks:
  home-network:
    external: true
