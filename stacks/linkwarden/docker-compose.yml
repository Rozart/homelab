networks:
  home-network:
    external: true

services:
  linkwarden-db:
    image: postgres:16-alpine
    container_name: linkwarden_db
    volumes:
      - ./appdata/db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: always
    networks:
      - home-network

  linkwarden:
    image: ghcr.io/linkwarden/linkwarden:latest
    container_name: linkwarden
    depends_on:
      - linkwarden-db
    ports:
      - 3003:3000
    volumes:
      - ./appdata/data:/data/data
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@linkwarden-db:5432/postgres
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_DISABLE_REGISTRATION: ${NEXT_PUBLIC_DISABLE_REGISTRATION:-false}
      TZ: ${TZ}
    restart: always
    networks:
      - home-network
