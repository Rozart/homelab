networks:
  home-network:
    external: true

services:
  shelfmark:
    image: ghcr.io/calibrain/shelfmark:latest
    container_name: shelfmark
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      FLASK_PORT: 8084
      USING_TOR: "true"
      INGEST_DIR: /books
    volumes:
      - ./appdata/config:/config
      - ${NAS_PATH}/calibre/ingest:/books
      - ${CWA_APP_DB}:/auth/app.db:ro
    ports:
      - 8084:8084
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/api/health"]
      interval: 30s
      timeout: 30s
      retries: 3
    networks:
      - home-network
